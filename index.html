<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPTV Player</title>
    <meta name="theme-color" content="#0c0c0e" />
    <link rel="stylesheet" href="assets/base.css" />
    <link rel="stylesheet" href="assets/home.css" />
</head>
<body>
    <div id="home">
        <div id="home-header">
            <div id="home-brand">📺 <span>IPTV <small>v1.0.27</small></span></div>
            <div id="home-date"></div>
        </div>

        <div id="home-grid">
            <!-- Live TV — big tile -->
            <div class="home-tile-main tile-livetv" id="tile-livetv" tabindex="-1">
                <div class="home-tile-icon">📺</div>
                <div class="home-tile-label">Live TV</div>
                <div class="home-tile-sub">Watch live channels</div>
            </div>

            <!-- VOD — big tile -->
            <div class="home-tile-main tile-vod" id="tile-vod" tabindex="-1">
                <div class="home-tile-icon">🎬</div>
                <div class="home-tile-label">VOD</div>
                <div class="home-tile-sub">Movies &amp; TV shows</div>
            </div>

            <!-- Small tiles column -->
            <div class="home-tile-col">
                <div class="home-tile-small tile-catchup" id="tile-catchup" tabindex="-1">
                    <div class="home-tile-icon">⏮</div>
                    <div class="home-tile-small-text">
                        <div class="home-tile-label">Catch-up</div>
                        <div class="home-tile-sub">Watch missed shows</div>
                    </div>
                </div>

                <div class="home-tile-small tile-settings" id="tile-settings" tabindex="-1">
                    <div class="home-tile-icon">⚙</div>
                    <div class="home-tile-small-text">
                        <div class="home-tile-label">Settings</div>
                        <div class="home-tile-sub">Configure your app</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="dist/js/polyfills.js"></script>
    <script src="dist/js/iptv-core.js"></script>
    <script src="dist/js/home.js"></script>
    <script defer src="dist/js/prewarm.js"></script>
</body>
</html>
