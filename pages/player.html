<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Player — IPTV</title>
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="../assets/base.css" />
    <link rel="stylesheet" href="../assets/player.css" />
</head>
<body class="vod-player-page">

<!-- pip-wrap + video (required by IPTVPlayer constructor) -->
<div id="pip-wrap">
    <video id="player" playsinline></video>
    <div id="player-msg" style="display:none"></div>
</div>

<!-- OSD — fades out after a few seconds of inactivity -->
<div id="osd" class="osd-hidden">

    <!-- Top bar: back button + title -->
    <div id="osd-top">
        <button id="player-back-btn" class="osd-btn" title="Back">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="2.4"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <span id="player-title"></span>
    </div>

    <!-- Bottom bar: scrubber + controls -->
    <div id="osd-bottom">
        <div id="osd-progress-wrap">
            <span id="osd-time-cur">0:00</span>
            <div id="osd-seek-track">
                <div id="osd-seek-buf"></div>
                <div id="osd-seek-fill"></div>
                <div id="osd-seek-thumb"></div>
            </div>
            <span id="osd-time-dur">--:--</span>
        </div>

        <div id="osd-controls">
            <button class="osd-btn osd-ctrl-btn" id="ctrl-rewind" title="Rewind 10s">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                    <text x="8.5" y="15.5" font-size="5.5" font-family="sans-serif" font-weight="700" fill="currentColor">10</text>
                </svg>
            </button>

            <button class="osd-btn osd-ctrl-btn osd-ctrl-play" id="ctrl-play" title="Play/Pause">
                <svg class="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg class="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
                </svg>
            </button>

            <button class="osd-btn osd-ctrl-btn" id="ctrl-forward" title="Forward 30s">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
                    <text x="8.5" y="15.5" font-size="5.5" font-family="sans-serif" font-weight="700" fill="currentColor">30</text>
                </svg>
            </button>

            <button class="osd-btn osd-ctrl-btn" id="ctrl-mute" title="Mute/Unmute">
                <svg class="icon-vol" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <svg class="icon-mute" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
            </button>

            <button class="osd-btn osd-ctrl-btn" id="ctrl-fullscreen" title="Toggle fullscreen">
                <svg class="icon-fs-enter" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
                <svg class="icon-fs-exit" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="../js/player.js"></script>
<script src="../js/player-vod.js"></script>
</body>
</html>
