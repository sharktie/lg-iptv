<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VOD — IPTV Player</title>
    <meta name="theme-color" content="#08090d" />
    <link rel="stylesheet" href="../assets/base.css" />
    <link rel="stylesheet" href="../assets/vod.css" />
</head>
<body>

<div id="vod-app">

    <!-- ── Left sidebar (collapsed; expands on LEFT) ───────────── -->
    <nav id="vod-sidebar">
        <div id="vod-sidebar-inner">
            <div id="vod-nav-top">
                <button class="vod-nav-item" data-action="search">
                    <span class="vod-nav-emoji">🔍</span><span class="vod-nav-label">Search</span>
                </button>
                <button class="vod-nav-item active" data-action="movie">
                    <span class="vod-nav-emoji">🎬</span><span class="vod-nav-label">Movies</span>
                </button>
                <button class="vod-nav-item" data-action="series">
                    <span class="vod-nav-emoji">📺</span><span class="vod-nav-label">Series</span>
                </button>
                <button class="vod-nav-item" data-action="settings">
                    <span class="vod-nav-emoji">⚙️</span><span class="vod-nav-label">Settings</span>
                </button>
            </div>
            <!-- Categories of the active section (populated by vod.js; visible when expanded) -->
            <div id="vod-nav-cats"></div>
        </div>
    </nav>

    <!-- ── Content ─────────────────────────────────────────────── -->
    <div id="vod-content">
        <div id="vod-rails"></div>
        <div id="vod-status" class="vod-status">
            <div class="vod-spinner"></div>
            <span id="vod-status-text">Loading…</span>
        </div>
    </div>

</div>

<!-- ── Search overlay ───────────────────────────────────────────── -->
<div id="vod-search-overlay" hidden>
    <div id="vod-search-bar">
        <svg class="vod-search-icon" width="20" height="20" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="8" r="5.2" stroke="currentColor" stroke-width="2"/>
            <path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="vod-search-input" type="text" placeholder="Search movies & series…"
               spellcheck="false" autocomplete="off" />
        <button id="vod-search-close" class="vod-icon-btn" title="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <div id="vod-search-hint" class="vod-search-hint">Type to search your whole library.</div>
    <div id="vod-search-grid" class="vod-grid"></div>
</div>

<!-- ── Detail overlay ───────────────────────────────────────────── -->
<div id="vod-detail" hidden role="dialog" aria-modal="true" aria-label="Title details">
    <div id="vod-detail-backdrop"></div>
    <div id="vod-detail-scrim"></div>

    <button id="vod-detail-close" class="vod-icon-btn" title="Close (Back)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
    </button>

    <div id="vod-detail-inner">
        <div id="vod-detail-poster-wrap">
            <img id="vod-detail-poster" src="" alt="" />
        </div>

        <div id="vod-detail-main">
            <h1 id="vod-detail-title"></h1>
            <div id="vod-detail-meta"></div>
            <p id="vod-detail-plot"></p>

            <div id="vod-detail-credits">
                <div class="vod-credit-row" id="vod-detail-cast-row">
                    <span class="vod-credit-label">Cast</span>
                    <span id="vod-detail-cast"></span>
                </div>
                <div class="vod-credit-row" id="vod-detail-director-row">
                    <span class="vod-credit-label">Director</span>
                    <span id="vod-detail-director"></span>
                </div>
            </div>

            <div id="vod-detail-actions">
                <button id="vod-play-btn" class="vod-btn vod-btn-primary">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M5 3l12 6-12 6V3z"/></svg>
                    <span id="vod-play-label">Play</span>
                </button>
            </div>

            <!-- Series only: season picker + episode list -->
            <div id="vod-seasons" hidden>
                <div id="vod-season-tabs"></div>
                <div id="vod-episode-list"></div>
            </div>
        </div>
    </div>
</div>

<script src="../dist/js/polyfills.js"></script>
<script src="../config/config.js"></script>
<script src="../dist/js/vod.js"></script>
</body>
</html>
