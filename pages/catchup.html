<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPTV Player</title>
    <meta name="theme-color" content="#0c0c0e" />
    <link rel="stylesheet" href="../assets/base.css" />
    <link rel="stylesheet" href="../assets/comingsoon.css" />
</head>
<body>
    <div id="coming-soon">
        <button id="back-btn" tabindex="-1">← Back</button>
        <div id="cs-content">
            <div id="cs-icon"></div>
            <div id="cs-title"></div>
            <div id="cs-sub">Coming soon</div>
        </div>
    </div>
    <!-- Inline script kept ES5 (not Babel-transpiled) for old-WebOS compat. -->
    <script>
        var meta = {
            vod:      { icon: "🎬", title: "VOD" },
            catchup:  { icon: "⏮",  title: "Catch-up" },
            settings: { icon: "⚙",  title: "Settings" }
        };
        var page = "catchup";
        document.getElementById("cs-icon").textContent  = meta[page].icon;
        document.getElementById("cs-title").textContent = meta[page].title;
        document.getElementById("back-btn").addEventListener("click", function () { history.back(); });
        window.addEventListener("keydown", function (e) {
            if (e.keyCode === 461 || e.keyCode === 8) { e.preventDefault(); history.back(); }
        });
        document.getElementById("back-btn").classList.add("tv-focus-visible");
    </script>
</body>
</html>
